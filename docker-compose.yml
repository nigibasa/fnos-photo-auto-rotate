services:
  photo-auto-rotate:
    build: .
    container_name: fnos-photo-auto-rotate
    restart: unless-stopped
    ports:
      - "8321:8321"
    environment:
      WEB_PORT: "8321"
      DATA_DIR: /data
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /vol1:/storage/vol1
      - /vol2:/storage/vol2
      - /vol1/docker/fnos-photo-auto-rotate:/data
