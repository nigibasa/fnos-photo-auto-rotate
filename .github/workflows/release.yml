name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_VERSION: "0.1.5"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image owner
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fnos-photo-auto-rotate" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_VERSION }}
            ${{ steps.image.outputs.name }}:latest

  fpk:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build FPK
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fnos-photo-auto-rotate:${IMAGE_VERSION}"
          python build_fpk.py --image "$IMAGE" --platform x86
          python build_fpk.py --image "$IMAGE" --platform arm
          python verify_fpk.py dist/PhotoAutoRotate_x86.fpk
          python verify_fpk.py dist/PhotoAutoRotate_arm.fpk
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoAutoRotate-fnOS
          path: dist/*.fpk
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.fpk
          generate_release_notes: true
